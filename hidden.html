<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome!</title>
    <link href="https://fonts.cdnfonts.com/css/roboto-condensed" rel="stylesheet">
	<link href="https://fonts.cdnfonts.com/css/roboto" rel="stylesheet">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Roboto', sans-serif;
            font-size: 16px;
            color: #000000;
            background-image: url('https://i.ibb.co/3Y1s9Y8q/5660d0ed05e6f747e85494627519fc54.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            justify-content: flex-start;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ffffff7f;
            z-index: 1;
        }
        .title {
		    font-family: 'Roboto Condensed', sans-serif;
            font-size: 50px;
            margin-top: 25px;
            z-index: 2;
        }
        .text {
            font-size: 16px;
            margin-top: 25px;
            width: 100%;
            padding: 0 20px;
            text-align: center;
            box-sizing: border-box;
            z-index: 2;
            overflow-wrap: break-word;
        }
        footer {
            font-family: 'Roboto', sans-serif;
            font-size: 12px;
            color: #0000007f;
            position: fixed;
            bottom: 0;
            right: 0;
            padding: 20px;
            z-index: 2;
        }
        .image-container {
            margin-top: 75px; 
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            justify-content: center;
            z-index: 2;
        }
        .image-container div {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0 25px;
        }
        .image-container img {
            width: 125px;
            height: 125px;
            cursor: pointer;
        }
        .no-underline {
            font-size: 28px;
            font-weight: 600;
            text-decoration: none;
            font-family: 'Roboto Condensed', sans-serif;
            display: block;
            text-align: center;			
		}
		.text2 {
		    font-weight: 600;
            text-decoration: none;
            font-family: 'Roboto Condensed', sans-serif;
            display: block;
            text-align: center;
			margin-top: 100px;
            margin-bottom: 50px;
			z-index: 2;
		}
            a:link {
            color: #051;
            background-color: transparent;
        }
    </style>
</head>
<body>

    <div class="overlay"></div>
    
    <div class="title">
        welcome to my site!
    </div>
    
    <div class="text">
        Hello there!<br><br>
        You are viewing my personal website which offers some pretty cool stuff I've made in my free time.
    </div>

    <div class="image-container">
        <div>
            <a href="about:blank">
                <img src="/src/blogs.png" alt="Blogs" />
            </a>
            <a href="about:blank" class="no-underline">Blogs</a>
        </div>
        <div>
            <a href="https://itslamby.github.io/games">
                <img src="/src/games.png" alt="Games" />
            </a>
            <a href="https://itslamby.github.io/games" class="no-underline">Games</a>
        </div>
        <div>
            <a href="about:blank">
                <img src="/src/radio.png" alt="Radio" />
            </a>
            <a href="habout:blank" class="no-underline">Radio</a>
        </div>
        <div>
            <a href="about:blank">
                <img src="/src/utils.png" alt="Utils" />
            </a>
            <a href="about:blank" class="no-underline">Utils</a>
        </div>
    </div>
	
	    <div class="text2">
	      <a href="about:blank">Placeholder</a> | <a href="about:blank">Placeholder</a>
    </div>

<footer id="footer"></footer>

<script>
  fetch('/src/footer.html')
    .then(res => res.text())
    .then(html => {
      document.getElementById('footer').innerHTML = html;
    })
    .catch(err => console.error('Failed to load footer:', err));
</script>

</body>
</html>
