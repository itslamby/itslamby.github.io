<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lamby's Utils</title>
	<link href="https://fonts.cdnfonts.com/css/roboto" rel="stylesheet">
    <style>

body {
	display: flex;
	flex-direction: column;
	align-items: left;
	min-height: 100vh;
	margin: 0;
	font-family: 'Roboto', sans-serif;
	font-size: 16px;
	color: #000000;
	background-image: url('/src/utilsbg.jpg');
	background-size: cover;
	background-position: center;
	background-attachment: fixed;
	justify-content: flex-start;
}
.overlay {
	position: fixed;
	top: 0;
	left: 0;
	right: 0;
	bottom: 0;
	background-color: #ffffffbf;
	z-index: 1;
}
.title {
    color: #000000;
    font-family: 'Roboto', sans-serif;
	font-size: 50px;
	margin-top: 25px;
	z-index: 2;
	text-align: center;
}
.text {
	font-family: 'Roboto', sans-serif;
	font-size: 22px;
	font-weight: 900;
	margin-top: 30px;
	width: 100%;
	padding: 0 20px;
	text-align: left;
	box-sizing: border-box;
	z-index: 2;
	overflow-wrap: break-word;
}
footer {
	font-family: 'Roboto', sans-serif;
	font-size: 12px;
	color: #0000007f;
	position: fixed;
	bottom: 0;
	right: 0;
	padding: 20px;
	z-index: 2;
}
.general {
		color: #000000;
		text-decoration: underline;
		display: block;
}
	
	</style>

</head>
<body>

    <div class="overlay"></div>
    
    <div class="title">
        Utils
    </div>
    
    <div class="text">
            <a class="general" href="https://itslamby.github.io/utils/distance"> Coordinate Distance Calculator </a>
	    	<a class="general" href="https://itslamby.github.io/utils/fmdx"> FM-DX Maps Lookup </a>
    </div>
    
<footer id="footer"></footer>

<script>
  fetch('/src/footer.html')
    .then(res => res.text())
    .then(html => {
      document.getElementById('footer').innerHTML = html;
    })
    .catch(err => console.error('Failed to load footer:', err));
</script>

</body>
</html>
