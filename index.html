<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction!</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Sans+MS&display=swap" rel="stylesheet">
	<link href="https://fonts.cdnfonts.com/css/roboto" rel="stylesheet">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Roboto', sans-serif;
            font-size: 16px;
            color: #000000;
            background-image: url('https://i.ibb.co/3Y1s9Y8q/5660d0ed05e6f747e85494627519fc54.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            justify-content: flex-start;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ffffff7f;
            z-index: 1;
        }
        .title {
		    font-family: "Comic Sans MS", "Comic Sans", cursive;
            font-size: 50px;
            margin-top: 25px;
            z-index: 2;
        }
        .text {
            font-family: 'Roboto', sans-serif;
            font-size: 16px;
            margin-top: 50px;
            width: 100%;
            padding: 0 20px;
            text-align: center;
            box-sizing: border-box;
            z-index: 2;
            overflow-wrap: break-word;
        }
        footer {
            font-family: 'Roboto', sans-serif;
            font-size: 12px;
            color: #0000007f;
            position: fixed;
            bottom: 0;
            right: 0;
            padding: 20px;
            z-index: 2;
        }
    </style>
</head>
<body>

    <div class="overlay"></div>
    
    <div class="title">
        welcome to my site!
    </div>
    
    <div class="text">
        Hello! This website is under construction. Check back later! ^^
    </div>

    <footer id="footer">
        2025 itslamby
    </footer>
</body>
</html>
